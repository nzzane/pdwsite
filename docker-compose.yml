# ─── PDW Monitor Server ───
# Main web app + API. Run with: docker compose up -d
#
# Upgrade notes:
#   - The pdw-data volume is preserved across upgrades (DB, secrets, VAPID keys)
#   - The pdw-net network is shared with optional companion services
#     (docker-compose.client.yml, docker-compose.rtlsdr.yml)
#   - Start companions AFTER this service is running so pdw-net exists

services:
  pdw-monitor:
    build: .
    container_name: pdw-monitor
    restart: unless-stopped

    ports:
      - "${PDW_PORT:-3000}:3000"

    volumes:
      # Persistent storage for SQLite DB, VAPID keys, etc.
      - pdw-data:/data

    environment:
      # ── Secrets (auto-generated on first run if not set) ──
      - JWT_SECRET=${JWT_SECRET:-}
      - API_KEY=${API_KEY:-}

      # ── Auto admin setup (first run only) ──
      # Default: admin / changeme
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}

      # ── Push notifications (auto-generated if not set) ──
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@example.com}

      # ── Tuning ──
      - DEDUP_WINDOW_MS=${DEDUP_WINDOW_MS:-30000}
      - MULTIPART_TIMEOUT_MS=${MULTIPART_TIMEOUT_MS:-10000}
      - NODE_ENV=production

      # ── RTL-SDR audio stream URL ──
      # Points to the rtlsdr companion service on the shared pdw-net network.
      # Leave empty to disable the in-app audio player entirely.
      - RTL_STREAM_URL=${RTL_STREAM_URL:-}

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # ── Resource limits ──
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # ── Security hardening ──
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

    stop_grace_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      br0.50:
        ipv4_address: 10.20.50.30
      pdw-net: {}

volumes:
  pdw-data:
    driver: local

networks:
  # External VLAN — remove or change to match your network setup
  br0.50:
    external: true
  # Shared network for companion services (client, rtlsdr)
  # Fixed name so other compose files can reference it as external
  pdw-net:
    name: pdw-net
